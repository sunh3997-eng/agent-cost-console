version: '3.9'

services:
  proxy:
    build:
      context: .
      dockerfile: packages/proxy/Dockerfile
    container_name: acc-proxy
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CACHE_ENABLED: "${CACHE_ENABLED:-true}"
      CACHE_THRESHOLD: "${CACHE_THRESHOLD:-0.92}"
      CACHE_MAX_ENTRIES: "${CACHE_MAX_ENTRIES:-500}"
      DB_DIR: "/app/data"
    volumes:
      - acc_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    container_name: acc-dashboard
    ports:
      - "3000:80"
    depends_on:
      proxy:
        condition: service_healthy
    restart: unless-stopped

  # Optional: seed sample data on first run
  seed:
    build:
      context: .
      dockerfile: packages/proxy/Dockerfile
    container_name: acc-seed
    environment:
      DB_DIR: "/app/data"
    volumes:
      - acc_data:/app/data
    command: ["node", "dist/seed.js"]
    depends_on:
      proxy:
        condition: service_healthy
    profiles:
      - seed

volumes:
  acc_data:
    driver: local
